server {
    listen 80;
    server_name dsic.duckdns.org mymalbeot.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dsic.duckdns.org;
    client_max_body_size 10M;

    ssl_certificate     /etc/certs/dsic-fullchain.pem;
    ssl_certificate_key /etc/certs/dsic-privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /jewelpro-app/ {
        alias /usr/share/nginx/jewelpro-app/;
        index index.html;
        try_files $uri $uri/ /jewelpro-app/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location /jewelpro/ {
        proxy_pass http://jewelpro:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /media/ {
        proxy_pass http://jewelpro:8000/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }
}

server {
    listen 443 ssl;
    server_name mymalbeot.duckdns.org;

    ssl_certificate     /etc/certs/fullchain.pem;
    ssl_certificate_key /etc/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        return 200 'mymalbeot coming soon';
        add_header Content-Type text/plain;
    }
}
