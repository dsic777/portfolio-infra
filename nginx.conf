# ─────────────────────────────────────────────────────────
# HTTP → HTTPS 리다이렉트 (두 도메인 공통)
# ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name dsic.duckdns.org mymalbeot.duckdns.org;
    return 301 https://$host$request_uri;
}

# ─────────────────────────────────────────────────────────
# dsic.duckdns.org — 포트폴리오 메인 + HumanRM + JewelPro
# ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name dsic.duckdns.org;
    client_max_body_size 10M;

    ssl_certificate     /etc/letsencrypt/live/dsic.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dsic.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ── JewelPro ──────────────────────────────────────────

    # JewelPro React SPA (/jewelpro-app/ base로 빌드됨)
    location /jewelpro-app/ {
        alias /usr/share/nginx/jewelpro-app/;
        index index.html;
        try_files $uri $uri/ /jewelpro-app/index.html;
    }

    # JewelPro Django API (prefix 제거 후 전달)
    location /jewelpro/ {
        proxy_pass http://jewelpro:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Jewelry 정적 HTML (mockup.html, mobile.html)
    location /humanrm/jewelry/ {
        alias /usr/share/nginx/jewelry/;
        try_files $uri =404;
    }

    # ── HumanRM ───────────────────────────────────────────

    location /human/ {
        proxy_pass http://humanrm:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://humanrm:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ { alias /app/staticfiles/; }
    location /media/  { alias /app/media/; }

    # ── 포트폴리오 메인 + HumanRM 노무자 React SPA ─────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# ─────────────────────────────────────────────────────────
# mymalbeot.duckdns.org — 말벗이 내 손 안에 (Malbeot2)
# ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name mymalbeot.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/mymalbeot.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mymalbeot.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api/ {
        proxy_pass http://malbeot-app:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://malbeot-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
